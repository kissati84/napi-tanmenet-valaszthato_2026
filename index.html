var NAPOK=[
 {h:1,d:"okt. 19. (H)",m:1,t:["Á/1","Á/2"],tip:"tan",tipp:1,tippmegj:"<p>A nyitó nap két alapozó tétellel, amelyek <strong>egymásra épülnek</strong>: előbb az elmélet (hatalommegosztás), majd ennek magyar gyakorlati leképezése (Ogy–Kormány viszony). Érdemes folyamatként kezelni őket.</p><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/1</span> — <strong>A hatalommegosztás átalakulása</strong>: elméleti, történeti ív — a szerzőkre figyelj: Arisztotelész → Locke (törvényhozó, végrehajtó, föderatív) → Montesquieu (3 ág) → Benjamin Constant (államfői/semleges hatalom). A 3 alapforma: klasszikus (USA), kétkamarás törvényhozás, föderalizmus. Az átalakulás lényege: a modern parlamentáris rendszerben a törvényhozás nem ellensúly, hanem partner — az egyensúlyt semleges szervek (ÁSZ, ombudsman, AB) adják.</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/2</span> — <strong>Az Országgyűlés és a Kormány viszonya</strong>: a parlamentáris köztársaság lényege: a Kormány az Ogynek felelős, bírnia kell a bizalmát. Kulcsfogalmak: konstruktív bizalmatlanság, bizalmi szavazás. Az Ogy ellenőrző eszközei: interpelláció (van viszontválasz) vs. kérdés (nincs).</div><div class=\"tipp-figyelj\"><strong>⚠ Amire figyelj:</strong> Az interpelláció és a kérdés különbsége (viszontválasz van-e) tipikus kérdés. A Kormány <strong>nem oszlathatja fel</strong> az Ogyt.</div>"},
 {h:1,d:"okt. 20. (K)",m:1,t:["Á/3","Á/4"],tip:"tan",tipp:1,tippmegj:"<p>A semleges hatalmi szervek napja: a köztársasági elnök és a két parlamenti ellenőrző szerv. Az Á/3 az államfői egyensúlyozó szerepet, az Á/4 a pénzügyi és alapjogi kontrollt mutatja be.</p><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/3</span> — <strong>A köztársasági elnök és a Kormány</strong>: az ellenjegyzés a tengely: válaszd szét az ellenjegyzéshez NEM kötött (önálló) és a kötött jogköröket. Az Ogy feloszlatásának 2 esete: a javasolt miniszterelnököt 40 napon belül nem választják meg, vagy márc. 31-ig nincs költségvetés (ex lex).</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/4</span> — <strong>ÁSZ és az alapvető jogok biztosa</strong>: kétoszlopos összevetés: ÁSZ (pénzügyi-gazdasági, 12 év, zárolhat, akadályozása bűncselekmény) vs. ombudsman (alapjogvédelem, 6 év, bárki kezdeményezheti, érdemi intézkedési joga nincs — csak ajánlás).</div><div class=\"tipp-figyelj\"><strong>⚠ Amire figyelj:</strong> Az ombudsmannak <strong>nincs érdemi intézkedési jogköre</strong> — csak ajánlást tesz, eljárást kezdeményez, nyilvánosságra hoz. Az ÁSZ ezzel szemben zárolhat.</div>"},
 {h:1,d:"okt. 21. (Sze)",m:2,t:["Á/5","Á/6"],tip:"tan",tipp:1,tippmegj:"<p>A közigazgatás szerkezetének alapfogalmai. Az Á/5 a két nagy alrendszert, az Á/6 a centralizáció-decentralizáció tengelyt mutatja be — a kettő összefügg.</p><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/5</span> — <strong>A magyar közigazgatás alrendszerei</strong>: 2 alrendszer: államigazgatás (országos ügyek, az állam felel) + helyi önkormányzatok (helyi közügyek, választott szervek). A 4 kapcsolódási pont: törvényességi felügyelet, delegált államigazgatási feladatok, területszervezés, véleményezési jog.</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/6</span> — <strong>Decentralizált és dekoncentrált szervek</strong>: élesen állítsd szembe: dekoncentrált = centralizált rendszer kirendeltsége, kinevezett vezető, hierarchikus alárendeltség, kormánytisztviselő. Decentralizált = önálló, választott vezető, autonómia, köztisztviselő (területi → önkormányzat, funkcionális → kórház, iskola).</div><div class=\"tipp-figyelj\"><strong>⚠ Amire figyelj:</strong> A dekoncentrált (kormánytisztviselő, kinevezett) vs. decentralizált (köztisztviselő, választott) elhatárolás a tétel magja — kétoszlopos táblát készíts.</div>"},
 {h:1,d:"okt. 22. (Cs)",m:2,t:["Á/7","Á/8"],tip:"tan",tipp:1,tippmegj:"<p>A szervezetrendszer és az irányítás. Az Á/7 a szervtípusokat rendszerezi, az Á/8 az irányítás-felügyelet-ellenőrzés viszonyt — mindkettő erősen fogalom-alapú.</p><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/7</span> — <strong>Az államigazgatási szervek csoportosítása</strong>: tipikus szervek (Kormány, minisztérium, központi hivatal, kormányzati főhivatal, területi szervek) + atipikus szervek (autonóm államigazgatási, önálló szabályozó — pl. NMHH, MEKH, SZTFH). Másik tengely: civil (kormány-/köztisztviselő) vs. rendészeti (hivatásos szolgálati jogviszony).</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/8</span> — <strong>Az irányítás</strong>: az irányítás a legintenzívebb akaratérvényesítés; eszközei (alapítás, vezetőkinevezés, ellenőrzés, egyedi utasítás). Fajtái: szakmai / szervezet / teljes irányítás. Korlátja a hatáskörelvonás tilalma.</div><div class=\"tipp-figyelj\"><strong>⚠ Amire figyelj:</strong> Az irányítás > felügyelet > ellenőrzés intenzitási sorrendet tartsd fejben. A felügyelet kevesebb rendelkezési joggal jár, mint az irányítás.</div>"},
 {h:1,d:"okt. 23. (P)",m:3,t:["Á/9","Á/10","Á/11"],tip:"tan",hosszu:1,tipp:1,tippmegj:"<p><strong>Hosszú nap</strong>, három összefüggő tétel a Kormányról: fogalom → működés → előkészítés. Kezeld <strong>egyetlen folyamatként</strong> — a Kormány „életét\" követed végig. Számolj 3 órával, tarts több szünetet.</p><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/9</span> — <strong>A Kormány fogalma, funkciói</strong>: az államigazgatás általános hatáskörű szerve; kettős funkció (kormányzati + közigazgatási). A miniszterelnök kiemelkedő szerepe: ő határozza meg az általános politikát, a Kormány megbízatása az ő megbízatásához kötött.</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/10</span> — <strong>A Kormány működése</strong>: testületi szervként, kormányüléseken működik; a miniszterelnök vezeti. A döntés formái: rendelet, határozat, irányelv, elvi állásfoglalás.</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/11</span> — <strong>A kormányülés előkészítése; KÁT</strong>: a közigazgatási egyeztetés + a Közigazgatási Államtitkári Értekezlet (KÁT), amely minden előterjesztést előzetesen megtárgyal. Tagjai a közigazgatási államtitkárok.</div><div class=\"tipp-figyelj\"><strong>⚠ Amire figyelj:</strong> A három tétel egy ívet ad: ne külön magold őket, hanem mondd el a Kormány „útját\" a megalakulástól a döntéshozatalig.</div>"},
 {h:1,d:"okt. 24. (Szo)",m:1,t:[],tip:"ism",tema:"Ismétlés — 1. hét anyaga · Á/1—Á/11 összefoglaló",osszef:"h1"},
 {h:1,d:"okt. 25. (V)",m:0,t:[],tip:"pih",tema:"Pihenőnap — kötelező kikapcsolódás"},
 {h:2,d:"okt. 26. (H)",m:3,t:["Á/12","Á/13"],tip:"tan",tipp:1,tippmegj:"<p>A Kormány segédszervei. Az Á/12 a kormánybiztost önállóan, az Á/13 a többi segédszerv kontextusában mutatja be — sok az átfedés, kezeld őket együtt.</p><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/12</span> — <strong>A kormánybiztos</strong>: egyszemélyi segédszerv; a Kormány nevezi ki normatív határozattal, max. 4 évre; a Kormány helyett és nevében jár el. Rokon: miniszterelnöki biztos, miniszterelnöki megbízott.</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/13</span> — <strong>Kormánybiztos és a többi segédszerv</strong>: a kabinet (koordináció, állásfoglalás, nem dönt a Kormány helyett — 4 kabinet) és a kormánybizottság (több ágazatot érintő ügyek). A kulcskülönbség: a kormánybiztos egyszemélyi, a kabinet és kormánybizottság testületi.</div><div class=\"tipp-figyelj\"><strong>⚠ Amire figyelj:</strong> Egyszemélyi (kormánybiztos) vs. testületi (kabinet, kormánybizottság) — ez a leggyakoribb elhatárolási kérdés.</div>"},
 {h:2,d:"okt. 27. (K)",m:3,t:["Á/14","Á/15"],tip:"tan",tipp:1,tippmegj:"<p>A minisztérium belső világa és a Miniszterelnökség. Az Á/14 a vezetési struktúra (politikai vs. szakmai vezetők), ez a tétel magja.</p><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/14</span> — <strong>A minisztérium vezetési struktúrája</strong>: élesen válaszd szét a politikai vezetőket (miniszter, államtitkár) és a szakmai vezetőket (közigazgatási államtitkár, helyettes államtitkár). A belső felépítés: főosztály → osztály.</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/15</span> — <strong>A Miniszterelnökség</strong>: a miniszterelnök munkaszervezete, élén a Miniszterelnökséget vezető miniszter; feladata a kormányzati koordináció és a miniszterelnök támogatása.</div><div class=\"tipp-figyelj\"><strong>⚠ Amire figyelj:</strong> A politikai (miniszter, államtitkár) vs. szakmai (közig. államtitkár, helyettes államtitkár) vezetők elhatárolása a vizsga kedvence — pontosan tudd, ki melyik.</div>"},
 {h:2,d:"okt. 28. (Sze)",m:4,t:["Á/16","Á/17"],tip:"tan",tipp:1,tippmegj:"<p>A területi és helyi államigazgatás. Az Á/16 az önkormányzatok delegált feladatait, az Á/17 a kormányhivatalt mutatja be.</p><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/16</span> — <strong>Önkormányzati államigazgatási feladatok</strong>: a delegált (átruházott) feladatok; e körben a testület utasítást nem adhat, a döntést nem bírálhatja felül. Államigazgatási feladatot csak törvény állapíthat meg, arányos támogatással. A jegyző látja el a zömét.</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/17</span> — <strong>A kormányhivatal</strong>: vezetés: főispán (politikai) + főigazgató (szakmai) + igazgató. A járási hivatalok a kormányhivatal szervezeti egységei. Feladatok: hatósági ügyek, önkormányzatok törvényességi felügyelete, koordináció.</div><div class=\"tipp-figyelj\"><strong>⚠ Amire figyelj:</strong> A kormányhivatal vezetője a <strong>főispán</strong> (a korábbi „kormánymegbízott\" helyett) — a jegyzet erre épít.</div>"},
 {h:2,d:"okt. 29. (Cs)",m:4,t:["Á/18","Á/19"],tip:"tan",tipp:1,tippmegj:"<p>A legalsó területi szint és a közigazgatás funkciói. Két eltérő tétel — kezeld őket külön.</p><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/18</span> — <strong>A járási hivatal</strong>: a kormányhivatal szervezeti egysége (kirendeltsége), a legalsó szintű általános hatáskörű területi államigazgatási szerv; hivatalvezető vezeti. A kormányablakok (integrált ügyfélszolgálat) működtetése.</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/19</span> — <strong>A közigazgatás alapfunkciói</strong>: állandó (a közigazgatás létéből fakadó) vs. változó funkciók. A feladatfelmérés módszertani kérdés; POSDCORB (Gulick 7 eleme) és a hatékony igazgatás modellje.</div><div class=\"tipp-figyelj\"><strong>⚠ Amire figyelj:</strong> A POSDCORB hét elemét (Planning, Organizing, Staffing, Directing, Coordinating, Reporting, Budgeting) érdemes fejből tudni.</div>"},
 {h:2,d:"okt. 30. (P)",m:4,t:["Á/20","Á/21","Á/22"],tip:"tan",hosszu:1,tipp:1,tippmegj:"<p><strong>Hosszú nap</strong>, három eltérő tétel — itt <strong>nincs közös ív</strong>, kezeld őket külön lapra, és súlyozz a kérdésszám szerint. Számolj 3 órával.</p><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/20</span> — <strong>Államigazgatási tevékenységfajták</strong>: jogalkotó tevékenység, hatósági jogalkalmazás, hatósági felügyelet, szervező-szolgáltató tevékenység. Fontos elhatárolások: hatáskör vs. feladatkör, a kiadmányozás (aláírási jog), a hatáskör-átruházás és szubdelegálás tilalma.</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/21</span> — <strong>A hatósági felügyelet típusai</strong>: 3 típus: speciális (ex lege, felügyeleti szervek), általános (a jogalkalmazó ellenőrzi saját aktusa követését), törvényességi (köztestületek felett — NEM hatósági felügyelet!).</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/22</span> — <strong>A nemzeti vagyon</strong>: 4 kategória: forgalomképtelen / nemzetgazdaságilag kiemelt / korlátozottan forgalomképes / üzleti. Rendeltetés szerint: kincstári vagyon vs. üzleti vagyon.</div><div class=\"tipp-figyelj\"><strong>⚠ Amire figyelj:</strong> A törvényességi felügyelet <strong>nem</strong> hatósági felügyelet, és alanya soha nem lehet magánszemély. A nemzeti vagyon 4 kategóriáját külön lapra vázold.</div>"},
 {h:2,d:"okt. 31. (Szo)",m:4,t:[],tip:"ism",tema:"Ismétlés — 2. hét anyaga · Á/12—Á/22 összefoglaló",osszef:"h2"},

 {h:3,d:"nov. 2. (H)",m:5,t:["Á/23","Á/24"],tip:"tan",tipp:1,tippmegj:"<p>A működés szabályozása és a személyzeti politika kezdete. Az Á/24 (zárt rendszer) az érdemibb és kérdezettebb.</p><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/23</span> — <strong>A szervezeti és működési szabályzat</strong>: belső szabályzat, jogszabályi felhatalmazás alapján (közjogi szervezetszabályozó eszköz, normatív utasítás). Tartalma: jogállás, feladat-hatáskör, szervezeti felépítés, működés rendje. Az irányító/felügyeleti szerv hagyja jóvá.</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/24</span> — <strong>Zárt rendszerű személyzeti politika</strong>: központilag irányított, egységes pragmatika; a munka élethivatás (élethossziglan); 2 alappillér: kiválasztás + karrier(rendszer); elmozdíthatatlanság elve; az előmenetel alapja a szolgálati idő + iskolai végzettség; kötött díjazás.</div><div class=\"tipp-figyelj\"><strong>⚠ Amire figyelj:</strong> A zárt rendszer az „élethivatás + karrier + elmozdíthatatlanság\" hármason áll — holnap a nyitott rendszerrel állítod majd szembe.</div>"},
 {h:3,d:"nov. 3. (K)",m:5,t:["Á/25","Á/26"],tip:"tan",tipp:1,tippmegj:"<p>A nyitott rendszer és a személyzeti politika története. Az Á/25 közvetlenül kapcsolódik a tegnapi zárt rendszerhez — összehasonlító táblát készíts.</p><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/25</span> — <strong>Nyitott rendszerű személyzeti politika</strong>: a magánigazgatáshoz hasonló: korlátozás nélküli belépés és egyoldalú megszüntetés; meghatározott feladatra szerződtetés; politikai szempontú kiválasztás lehetséges (USA: „zsákmányrendszer\"); nagy fluktuáció; teljesítményfüggő díjazás.</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/26</span> — <strong>Személyzeti politika fejlődése 1867-től</strong>: 7 korszak időrendje: 1867 (kiegyezés, nyitottság) → 1914 (korszerű zárt rendszer) → 1945 (zsákmányrendszer) → 1945–49 (pártszempontok) → 1949 (államigazgatási, párthűség) → 1957–89 (konszolidáció) → 1992 (demokratikus újjáépítés).</div><div class=\"tipp-figyelj\"><strong>⚠ Amire figyelj:</strong> A zárt (Á/24) vs. nyitott (Á/25) rendszer szembeállítása a leggyakoribb kérdés — a kétoszlopos tábla mentén tudsz a vizsgán érvelni.</div>"},
 {h:3,d:"nov. 4. (Sze)",m:5,t:["Á/27","Á/28"],tip:"tan",tipp:1,tippmegj:"<p>A felelősségi alakzatok első két fajtája. Mindkettő vétkességhez kötött jogi felelősség — a különbség a tárgyban van.</p><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/27</span> — <strong>A fegyelmi felelősség</strong>: a jogviszonyból eredő kötelezettség vétkes megszegése; fegyelmi eljárás; büntetések sorrendje: megrovás → várakozási idő meghosszabbítása → fizetési fokozatban visszavetés → hivatalvesztés.</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/28</span> — <strong>A kárfelelősség</strong>: feltételei: kötelezettségszegés + kár + okozati összefüggés + vétkesség. Gondatlan (korlátozott) vs. szándékos (teljes) károkozás; megőrzési és leltárhiány-felelősség; kimentés vis maior esetén.</div><div class=\"tipp-figyelj\"><strong>⚠ Amire figyelj:</strong> A fegyelmi büntetések sorrendjét (a megrovástól a hivatalvesztésig) és a gondatlan/szándékos károkozás eltérő mértékét pontosan tudd.</div>"},
 {h:3,d:"nov. 5. (Cs)",m:5,t:["Á/29","Á/30"],tip:"tan",tipp:1,tippmegj:"<p>A vezetői felelősség és a reformirányzat. Az Á/29 a felelősségi alakzatokat zárja, az Á/30 (NPM) új témakört nyit.</p><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/29</span> — <strong>A vezetői eredményfelelősség</strong>: a vezető a szervezeti egysége eredményességéért felel — NEM feltétlenül jogsértés alapján. Állítsd szembe a jogi felelősséggel (jogsértéshez kötött, szankcióval jár). A 4 jogi felelősségi alakzat: fegyelmi, kártérítési, büntetőjogi, etikai.</div><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/30</span> — <strong>Az új közmenedzsment (NPM)</strong>: a jóléti állam túlterjeszkedésére adott válasz (80-as évek vége–ezredforduló); cél a hatékonyság, „olcsó, kicsi állam\"; eszközök: kiszervezés, privatizáció, ügynökségek, teljesítményértékelés. Kritikák: az állam nem működtethető tisztán piaci mintára.</div><div class=\"tipp-figyelj\"><strong>⚠ Amire figyelj:</strong> Az eredményfelelősség NEM jogsértéshez kötött — ez különbözteti meg a 4 jogi felelősségi alakzattól. Ezt emeld ki.</div>"},
 {h:3,d:"nov. 6. (P)",m:5,t:["Á/31"],tip:"tan",tipp:1,tippmegj:"<p>Az utolsó tanulós tétel: az Európai Közigazgatási Tér. A felkészülés tartalmi zárása — van időd alaposan, és érdemes a teljes anyagra is visszatekinteni.</p><div class=\"tipp-tetel\"><span class=\"tipp-tetel-kod\">Á/31</span> — <strong>Az Európai Közigazgatási Tér</strong>: a 90-es évek második fele; a tagállamok kötelesek az uniós vívmányokat (acquis) integrálni. Az általános követelmények (jogbiztonság, nyitottság-átláthatóság, hatékonyság) és az európai közigazgatási alapelvek (megbízhatóság, pártatlanság, az Európai Bíróság esetjoga: arányosság, jogbiztonság, meghallgatás elve).</div><div class=\"tipp-figyelj\"><strong>⚠ Amire figyelj:</strong> Ez az utolsó új tétel — utána már csak ismétlés jön. Szánj a végén időt arra, hogy a 31 tételt egészben is átfusd fejben.</div>"},
 {h:3,d:"nov. 7. (Szo)",m:5,t:[],tip:"ism",tema:"Ismétlés — 3. hét anyaga + teljes áttekintés · Á/23—Á/31",osszef:"h3"},
 {h:3,d:"nov. 8. (V)",m:0,t:[],tip:"pih",tema:"Pihenőnap — kötelező kikapcsolódás"},
 {h:4,d:"nov. 9. (H)",m:0,t:[],tip:"on",tema:"ZÁRÓ — teljes önellenőrzés, gyenge pontok pótlása, korai lefekvés",tipp:1},
 {h:4,d:"nov. 10. (K)",m:0,t:[],tip:"viz",tema:"ÍRÁSBELI VIZSGA — Sok sikert!"}
];



var ALTRITMUS='<div class="tipp-szakasz-cim">Általános napi ritmus (~2-3 óra)</div><ul class="tipp-lepesek"><li><span class="tipp-lepes-cim">Ráhangolódás<span class="tipp-ido">~10 perc</span></span><br>Nyisd meg a tétel(eke)t, és olvasd át <em>csak a kérdéseket</em> — a 15, 10 és 5 pontosakat is. Így előre látod, hová fut ki a téma.</li><li><span class="tipp-lepes-cim">Megértő átolvasás<span class="tipp-ido">~25-30 perc</span></span><br>Olvasd át a jegyzetet egyszer, végig, <em>jegyzetelés nélkül</em>. A cél nem a rögzítés, hanem a logikai ív és az ok-okozat megértése.</li><li><span class="tipp-lepes-cim">Saját vázlat fejből<span class="tipp-ido">~30 perc</span></span><br>Csukd be a jegyzetet, és <em>fejből</em> vázolj papírra (kulcsszavak, fogalmak, törvényszámok). Aztán nyisd ki, és egészítsd ki, ami kimaradt. Ez lesz a szombati ismétlés alapanyaga — ne dobd el!</li><li><span class="tipp-lepes-cim">A 10 és 5 pontos kérdések<span class="tipp-ido">~30 perc</span></span><br>Ezek a fő tételhez <em>csatolt</em> kiegészítések. Mindegyikhez elég egy-két mondatos vázlatpont. Figyelj a pontos megnevezésekre, számokra és törvényszámokra — írásban ezek értéket érnek.</li><li><span class="tipp-lepes-cim">Hangos önellenőrzés<span class="tipp-ido">~25 perc</span></span><br>Tegyél félre mindent, és mondd el <em>hangosan</em>, mintha vizsgáztatnád magad. Ahol megakadsz — és csak ott — nézz vissza. Ismételd, amíg gördülékenyen megy.</li><li><span class="tipp-lepes-cim">Rövid írásgyakorlás<span class="tipp-ido">~15 perc</span></span><br>Zárd a napot egy mini-próbával: 15 perc alatt írd le vázlatosan a 15 pontos kérdés válaszát, ahogy a vizsgán tennéd. Utána vesd össze a jegyzettel — mi maradt ki?</li></ul><div class="tipp-lab">A 2-3 órát ne egyben told végig: kb. 45-50 percenként tarts 5-10 perc szünetet. A cél a megértés és egy használható vázlat, nem a szó szerinti tudás — azt az ismétlések építik fel.</div>';
var ONRITMUS='<div class="tipp-szakasz-cim">Záró önellenőrzés ritmusa (~2-3 óra)</div><ul class="tipp-lepesek"><li><span class="tipp-lepes-cim">Ne olvass új anyagot</span><br>Ma nem tanulsz, hanem <em>visszakérdezel</em>. Vedd elő a 3 hét alatt készített saját vázlataidat.</li><li><span class="tipp-lepes-cim">Hangos felidézés tételenként</span><br>Mind a 31 tételt fusd át <em>fejből, hangosan</em> — mintha a vizsgáztatónak magyaráznál. Csak akkor lapozz a jegyzethez, ha elakadsz.</li><li><span class="tipp-lepes-cim">A gyenge pontok pótlása</span><br>Amelyik tételnél akadozol, azt jelöld meg, és célzottan nézd át újra. A három szombati összefoglaló kompakt térképe most a fő referenciád.</li><li><span class="tipp-lepes-cim">Korai lefekvés</span><br>Holnap a vizsga — aludj legalább 7-8 órát, egyél könnyű reggelit, és érkezz 15-20 perccel korábban.</li></ul><div class="tipp-lab">Az utolsó nap nem a bemagolásé, hanem a megnyugvásé. Aki idáig követte a tanmenetet, annak a tudás már a fejében van — most a felidézés gördülékenységét csiszolod.</div>';

var TN={
  tan:"Új anyag", ism:"Ismétlés", on:"Önellenőrzés",
  vaz:"Vázlat", pot:"Pótlás", pih:"Pihenő",
  un:"Ünnep", viz:"Vizsga"
};

var MNEV={0:"Ismétlés / Záró",1:"Alkotmányos alapok",2:"Szervezetrendszer",3:"Kormány és szervei",4:"Területi igazgatás",5:"Személyzet és reform"};

// Csoportosítás hetek szerint
var hetek={};
NAPOK.forEach(function(n){
  if(!hetek[n.h]) hetek[n.h]=[];
  hetek[n.h].push(n);
});
var hl=Object.keys(hetek).map(Number).sort(function(a,b){return a-b;});

// Navigációs gombok
var nav=document.getElementById("navBar");
var fo=document.getElementById("fo");

hl.forEach(function(h){
  var btn=document.createElement("button");
  btn.className="nav-gomb";
  btn.id="b"+h;
  btn.textContent=h+". hét";
  btn.onclick=function(){show(h);};
  nav.appendChild(btn);
});

function show(h){
  document.querySelectorAll(".nav-gomb").forEach(function(b){b.classList.remove("on");});
  document.getElementById("b"+h).classList.add("on");
  fo.innerHTML="";
  var ns=hetek[h];

  // Napi al-navigáció építése
  var napNav=document.getElementById("napNav");
  napNav.innerHTML='<div class="nap-nav-cim">'+h+'. hét napjai</div>';
  ns.forEach(function(nap,idx){
    var ng=document.createElement("button");
    ng.className="nap-gomb nap-gomb-mod"+nap.m;
    var isSzo=nap.d.indexOf("Szo")>-1;
    var isUn=nap.tip==="un"||nap.tip==="pih";
    var isViz=nap.tip==="viz";
    if(isSzo) ng.classList.add("szombat");
    if(isUn) ng.classList.add("unnep");
    if(isViz) ng.classList.add("vizsga");
    var dParts=nap.d.match(/^([a-záéíóöőúüű]+)\.\s*(\d+)\.\s*\(([A-Za-zóöőúüű]+)\)/i);
    var rovidMap={"H":"Hétfő","K":"Kedd","Sze":"Szerda","Cs":"Csütörtök","P":"Péntek","Szo":"Szombat"};
    var hnap=dParts?(rovidMap[dParts[3]]||dParts[3]):"";
    var teljes=dParts?(hnap+" · "+dParts[1]+". "+dParts[2]+"."):nap.d;
    ng.innerHTML='<span class="nap-gomb-pont"></span><span>'+teljes+'</span>';
    ng.onclick=function(){ugrasNapra(h,idx);};
    napNav.appendChild(ng);
  });


  // Heti fejléc
  var d1=ns[0].d.split("(")[0].trim();
  var dl=ns[ns.length-1].d.split("(")[0].trim();
  var mset={};
  ns.forEach(function(n){ if(n.m>0) mset[n.m]=1; });
  var mlbl=Object.keys(mset).map(function(m){return MNEV[m];}).join(" + ")||"Összefoglaló ismétlés";

  var hf=document.createElement("div");
  hf.className="het-fejlec";
  hf.innerHTML='<div class="het-szam-nagy">'+h+'.</div>'+
    '<div class="het-info">'+
      '<div class="het-cim">'+mlbl+'</div>'+
      '<div class="het-datum">'+d1+' — '+dl+' · '+ns.length+' nap</div>'+
    '</div>';
  fo.appendChild(hf);

  // Napok
  ns.forEach(function(nap){
    var nk=0;
    nap.t.forEach(function(k){
      var te=T[k]; if(te) nk+=te.k15.length+te.k10.length+te.k5.length;
    });

    var isSzo=nap.d.indexOf("Szo")>-1;
    var isUn=nap.tip==="un";
    var isViz=nap.tip==="viz";
    var isPih=nap.tip==="pih";

    var napDiv=document.createElement("article");
    napDiv.className="nap m"+nap.m;
    if(isSzo) napDiv.classList.add("szombat");
    if(isUn||isPih) napDiv.classList.add("unnep");
    if(isViz) napDiv.classList.add("vizsga");

    // Téma — rövid címet kreálunk a tételekhez
    var tema=nap.tema;
    if(!tema && nap.t.length>0){
      if(nap.t.length===1){
        var te=T[nap.t[0]];
        tema=te?te.c:nap.t[0];
      } else {
        tema=nap.t.length+" tétel — "+MNEV[nap.m];
      }
    }
    if(!tema) tema=TN[nap.tip];

    // Datum parts
    var dParts=nap.d.match(/^([a-záéíóöőúüű]+)\.\s*(\d+)\.\s*\(([A-Za-zóöőúüű]+)\)/i);
    var honap=dParts?dParts[1]:"";
    var dnap=dParts?dParts[2]:"";
    var hnap=dParts?dParts[3]:"";

    var statTxt;
    if(nap.t.length>0){
      statTxt=nap.t.length+" tétel · "+nk+" kérdés";
    } else {
      statTxt=TN[nap.tip];
    }

    // Teljes napnév kiszámítása
    var teljesNapMap={"H":"Hétfő","K":"Kedd","Sze":"Szerda","Cs":"Csütörtök","P":"Péntek","Szo":"Szombat","V":"Vasárnap"};
    var teljesNap=teljesNapMap[hnap]||hnap;

    var fej=document.createElement("div");
    var van_tartalom=nap.t.length>0||nap.osszef;
    fej.className="nap-fej"+(van_tartalom?" kattintható":"");
    fej.innerHTML=
      '<div class="nap-datum-blokk">'+
        '<div class="nap-honap">'+honap+'</div>'+
        '<div class="nap-szam">'+dnap+'</div>'+
        '<div class="nap-honap-nev">'+hnap+'</div>'+
      '</div>'+
      '<div class="nap-info">'+
        '<div class="nap-tipus-row">'+
          '<span class="nap-hetnev">'+teljesNap+'</span>'+
          '<span class="tipus-pill">'+TN[nap.tip]+'</span>'+
          '<span class="nap-stat">'+statTxt+'</span>'+
          (nap.hosszu?'<span class="nap-hosszu">⚠ hosszú nap — szánjon rá többet vagy ossza két napra</span>':'')+
        '</div>'+
        '<div class="nap-tema">'+tema+'</div>'+
      '</div>'+
      (van_tartalom?'<div class="nap-nyil">▼</div>':'');

    var body=document.createElement("div");
    body.className="nap-body";

    if(van_tartalom){
      fej.onclick=function(){
        var open=body.style.display==="block";
        body.style.display=open?"none":"block";
        if(open) napDiv.classList.remove("nyitva");
        else napDiv.classList.add("nyitva");
      };

      // Ha van összefoglaló, azt renderelni
      if(nap.osszef && OSSZEF[nap.osszef]){
        var osDiv=document.createElement("div");
        osDiv.style.padding="14px 16px";
        osDiv.innerHTML=OSSZEF[nap.osszef];
        body.appendChild(osDiv);
      }

      // Tanulási tipp panel (tan/on napokon)
      if(nap.tipp){
        var tippWrap=document.createElement("div");
        tippWrap.style.padding="14px 16px 0";
        var ritmus=(nap.tip==="on")?ONRITMUS:ALTRITMUS;
        var napiHtml=nap.tippmegj?('<div class="tipp-napi">'+nap.tippmegj+'</div>'):'';
        tippWrap.innerHTML='<div class="tipp-panel"><div class="tipp-fej"><span class="tipp-fej-cim">📖 Hogyan dolgozd fel ezt a napot?</span><span class="tipp-fej-nyil">▼</span></div><div class="tipp-body">'+napiHtml+ritmus+'</div></div>';
        var panel=tippWrap.querySelector(".tipp-panel");
        var pfej=tippWrap.querySelector(".tipp-fej");
        pfej.onclick=function(e){e.stopPropagation();panel.classList.toggle("nyitva");};
        body.appendChild(tippWrap);
      }

      nap.t.forEach(function(k){
        var te=T[k]; if(!te) return;
        var tDiv=document.createElement("div");
        tDiv.className="tetel";
        var html='<div class="tetel-fej">'+
          '<span class="tetel-kod">'+k+'</span>'+
          '<span class="tetel-cim">'+te.c+'</span>'+
        '</div>';

        // 15p
        if(te.k15.length>0){
          html+='<div class="kerdes-csoport k15-csop"><div class="csoport-cim">15 pontos · Fő tétel</div>';
          te.k15.forEach(function(q){
            html+='<div class="kerdes k15"><span class="kerdes-jelolo">15p</span><span class="kerdes-szoveg">'+q+'</span></div>';
          });
          html+='</div>';
        }
        // 10p
        if(te.k10.length>0){
          html+='<div class="kerdes-csoport k10-csop"><div class="csoport-cim">10 pontos kérdések</div>';
          for(var i=0;i<te.k10.length;i+=2){
            html+='<div class="kerdes"><span class="kerdes-jelolo">10·'+te.k10[i]+'</span><span class="kerdes-szoveg">'+te.k10[i+1]+'</span></div>';
          }
          html+='</div>';
        }
        // 5p
        if(te.k5.length>0){
          html+='<div class="kerdes-csoport k5-csop"><div class="csoport-cim">5 pontos kérdések</div>';
          for(var i=0;i<te.k5.length;i+=2){
            html+='<div class="kerdes"><span class="kerdes-jelolo">5·'+te.k5[i]+'</span><span class="kerdes-szoveg">'+te.k5[i+1]+'</span></div>';
          }
          html+='</div>';
        }

        tDiv.innerHTML=html;
        body.appendChild(tDiv);
      });
    }

    napDiv.appendChild(fej);
    napDiv.appendChild(body);
    fo.appendChild(napDiv);
  });

  fo.scrollIntoView({behavior:"smooth",block:"start"});
}

function ugrasNapra(h,idx){
  show(h);
  setTimeout(function(){
    var napok=document.querySelectorAll("#fo .nap");
    if(napok[idx]){
      napok[idx].scrollIntoView({behavior:"smooth",block:"center"});
      napok[idx].classList.add("highlighted");
      // Automatikus kibontás
      var body=napok[idx].querySelector(".nap-body");
      var fej=napok[idx].querySelector(".nap-fej.kattintható");
      if(body&&fej&&body.style.display!=="block"){
        body.style.display="block";
        napok[idx].classList.add("nyitva");
      }
      setTimeout(function(){napok[idx].classList.remove("highlighted");},1400);
    }
  },100);
}

show(1);
</script>
</body>
</html>
